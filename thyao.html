<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THYAO - BIST AI Tracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f172a; color:white; font-family:Arial, sans-serif; }
.container { padding:20px; max-width:1100px; margin:auto; }
.card { background:#111827; border:1px solid #1f2937; border-radius:12px; padding:20px; margin-bottom:20px; }
h1 { margin-bottom:10px; }
.price { font-size:2.5em; font-weight:bold; margin:10px 0; }
.positive { color:#22c55e; }
.negative { color:#ef4444; }
button { padding:12px 20px; margin:5px; border:none; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<div class="container">
    <h1>THYAO - Türk Hava Yolları</h1>
    
    <div class="card">
        <h2>Güncel Fiyat</h2>
        <p class="price" id="currentPrice">Yükleniyor...</p>
        <p id="changePercent" style="font-size:1.3em;"></p>
    </div>

    <!-- TradingView Grafik -->
    <div class="card">
        <h2>Grafik</h2>
        <div style="height:520px;">
            <iframe src="https://www.tradingview.com/widgetembed/?symbol=BIST%3ATHYAO" 
                    width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <!-- Alarm -->
    <div class="card">
        <h2>🔔 Alarm Kur</h2>
        <input id="alarmPrice" type="number" placeholder="Alarm fiyatı (örn: 245.50)" style="padding:12px; width:70%;">
        <button onclick="setAlarm()">Alarm Kur</button>
        <p id="alarmStatus" style="margin-top:10px; color:#94a3b8;"></p>
    </div>

    <!-- AI Yorum -->
    <div class="card">
        <h2>AI Yorum</h2>
        <p id="aiYorum" style="line-height:1.6; background:#1e2937; padding:15px; border-radius:8px;">
            THYAO, son dönemde güçlü bir toparlanma gösterdi. Petrol fiyatlarındaki dalgalanma ve turizm sezonunun etkisiyle orta vadede pozitif görünüm devam ediyor.
        </p>
    </div>

    <!-- Haberler -->
    <div class="card">
        <h2>Son Haberler</h2>
        <div id="newsContainer">Haberler yükleniyor...</div>
    </div>
</div>

<script>
// Gerçek fiyat çekme
async function loadPrice() {
    try {
        const res = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/THYAO.IS?interval=1d');
        const data = await res.json();
        const meta = data.chart.result[0].meta;
        
        const price = meta.regularMarketPrice || meta.chartPreviousClose;
        const change = meta.regularMarketChangePercent || 0;

        document.getElementById("currentPrice").textContent = price.toFixed(2) + " ₺";
        const changeEl = document.getElementById("changePercent");
        changeEl.textContent = (change >= 0 ? "▲ +" : "▼ ") + change.toFixed(2) + "%";
        changeEl.className = change >= 0 ? "positive" : "negative";
    } catch(e) {
        document.getElementById("currentPrice").textContent = "Veri alınamadı";
    }
}

// Alarm
function setAlarm() {
    const price = document.getElementById("alarmPrice").value;
    if (price) {
        localStorage.setItem("alarm_THYAO", price);
        document.getElementById("alarmStatus").textContent = `✅ Alarm kuruldu: ${price} ₺`;
    }
}

// Haberler (örnek)
function loadNews() {
    const container = document.getElementById("newsContainer");
    container.innerHTML = `
        <p style="padding:10px; background:#1e2937; margin:8px 0; border-radius:6px;">• THYAO filosunu genişletmeye devam ediyor.</p>
        <p style="padding:10px; background:#1e2937; margin:8px 0; border-radius:6px;">• Turizm sezonunda rekor yolcu sayısı bekleniyor.</p>
    `;
}

window.onload = () => {
    loadPrice();
    loadNews();
};
</script>
</body>
</html>
