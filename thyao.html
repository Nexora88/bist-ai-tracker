<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THYAO - BIST AI Tracker</title>
<style>
/* ... önceki stiller aynı ... */
</style>
</head>
<body>

<div class="container">
    <button class="back-btn" onclick="window.location.href='index.html'">← Ana Sayfaya Dön</button>
    
    <h1>THYAO - Türk Hava Yolları</h1>

    <div class="card">
        <h2>Güncel Fiyat</h2>
        <p class="price" id="currentPrice">Yükleniyor...</p>
        <p id="changePercent" style="font-size:1.4em;"></p>
    </div>

    <div class="card">
        <h2>Teknik Bilgiler</h2>
        <div class="tech-grid">
            <div><strong>Hacim:</strong> <span id="volume">---</span></div>
            <div><strong>RSI (14):</strong> <span id="rsi">---</span></div>
            <div><strong>Günlük Değişim:</strong> <span id="dailyChange">---</span></div>
            <div><strong>Yüksek / Düşük:</strong> <span id="highLow">---</span></div>
        </div>
    </div>

    <div class="card">
        <h2>Grafik</h2>
        <div style="height:520px;">
            <iframe src="https://www.tradingview.com/widgetembed/?symbol=BIST%3ATHYAO" width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </div>

    <div class="card">
        <h2>🔔 Alarm Kur</h2>
        <input id="alarmPrice" type="number" placeholder="Alarm fiyatı" style="padding:12px; width:70%;">
        <button onclick="setAlarm()">Alarm Kur</button>
        <p id="alarmStatus" style="margin-top:10px;"></p>
    </div>
</div>

<script>
// Bildirim izni
if (Notification.permission === "default") {
    Notification.requestPermission();
}

// Veri Yükleme
async function loadData() {
    try {
        const res = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/THYAO.IS?interval=1d');
        const json = await res.json();
        const r = json.chart.result[0];
        const meta = r.meta;
        const quote = r.indicators.quote[0];

        const price = meta.regularMarketPrice || meta.chartPreviousClose;
        const change = meta.regularMarketChangePercent || 0;
        const volume = (quote.volume[quote.volume.length-1] / 1000000).toFixed(1) + "M";

        let rsi = "---";
        const closes = quote.close;
        if (closes.length >= 15) {
            let gain = 0, loss = 0;
            for (let i = 1; i <= 14; i++) {
                const diff = closes[closes.length-i] - closes[closes.length-i-1];
                if (diff > 0) gain += diff; else loss -= diff;
            }
            const rs = gain / (loss || 0.0001);
            rsi = (100 - 100 / (1 + rs)).toFixed(1);
        }

        document.getElementById("currentPrice").textContent = parseFloat(price).toFixed(2) + " ₺";
        const changeEl = document.getElementById("changePercent");
        changeEl.textContent = (change >= 0 ? "▲ +" : "▼ ") + change.toFixed(2) + "%";
        changeEl.className = change >= 0 ? "positive" : "negative";

        document.getElementById("volume").textContent = volume;
        document.getElementById("rsi").textContent = rsi;
        document.getElementById("dailyChange").textContent = change.toFixed(2) + "%";
        document.getElementById("highLow").textContent = meta.regularMarketDayHigh.toFixed(2) + " / " + meta.regularMarketDayLow.toFixed(2);

    } catch(e) {
        document.getElementById("currentPrice").textContent = "Veri alınamadı";
    }
}

function setAlarm() {
    const price = document.getElementById("alarmPrice").value;
    if (!price) return;

    localStorage.setItem("alarm_THYAO", price);
    document.getElementById("alarmStatus").innerHTML = `✅ Alarm kuruldu: <b>${price} ₺</b>`;

    if (Notification.permission === "granted") {
        new Notification("THYAO Alarmı Kuruldu", {
            body: `${price} TL seviyesinde bildirim alacaksınız.`,
            icon: "https://www.borsaistanbul.com/favicon.ico"
        });
    } else {
        alert("Bildirim izni verilmedi. Tarayıcı ayarlarından izin verebilirsiniz.");
    }
}

window.onload = () => {
    loadData();
};
</script>
</body>
</html>
