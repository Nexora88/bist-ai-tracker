<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEFES ULTRA</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
.container { max-width:1000px; margin:auto; padding:20px; }

.card {
  background:#111827;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:18px;
  margin-bottom:18px;
}

.price { font-size:2.8em; font-weight:bold; }
.green { color:#22c55e; }
.red { color:#ef4444; }

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
  width:70%;
}

</style>
</head>

<body>

<div class="container">

<button onclick="location.href='index.html'">← Ana Sayfa</button>

<h1>📊 AEFES ULTRA LIVE</h1>

<div class="card">
  <div>Güncel Fiyat</div>
  <div id="price" class="price">Yükleniyor...</div>
  <div id="change"></div>
</div>

<div class="card">
  <h3>Teknik</h3>
  <p>Hacim: <b id="volume">---</b></p>
  <p>RSI: <b id="rsi">---</b></p>
  <p>High/Low: <b id="hl">---</b></p>
</div>

<div class="card">
  <h3>🔔 Alarm</h3>
  <input id="alarmInput" placeholder="Fiyat gir">
  <button onclick="setAlarm()">Kur</button>
  <p id="alarmStatus"></p>
</div>

<div class="card">
  <h3>📈 Grafik</h3>
  <iframe
    src="https://www.tradingview.com/widgetembed/?symbol=BIST%3AAEFES"
    width="100%" height="450"></iframe>
</div>

<div class="card">
  <h3>AI Yorum</h3>
  <p>AEFES yaz sezonu etkisiyle hacim artışı potansiyeli taşır.</p>
</div>

</div>

<script>

const SYMBOL = "AEFES.IS";
let lastPrice = 0;

// 🔁 CANLI VERİ
async function fetchStock() {
  try {

    const url = "https://api.allorigins.win/raw?url=" +
      encodeURIComponent(
        `https://query1.finance.yahoo.com/v8/finance/chart/${SYMBOL}?interval=1d`
      );

    const res = await fetch(url);
    const json = await res.json();

    const r = json?.chart?.result?.[0];
    if (!r) return;

    const meta = r.meta || {};
    const q = r.indicators?.quote?.[0] || {};

    const price = meta.regularMarketPrice ?? 0;
    const change = meta.regularMarketChangePercent ?? 0;

    const closes = q.close || [];
    const vol = q.volume?.at(-1) || 0;

    // RSI
    let rsi = 0;
    if (closes.length > 15) {
      let g = 0, l = 0;

      for (let i = 1; i <= 14; i++) {
        const a = closes.at(-i);
        const b = closes.at(-i-1);
        if (a == null || b == null) continue;

        const diff = a - b;
        diff > 0 ? g += diff : l -= diff;
      }

      const rs = g / (l || 1);
      rsi = 100 - (100 / (1 + rs));
    }

    // UI
    document.getElementById("price").innerText =
      price.toFixed(2) + " ₺";

    const ch = document.getElementById("change");
    ch.innerText = (change >= 0 ? "▲ +" : "▼ ") + change.toFixed(2) + "%";
    ch.className = change >= 0 ? "green" : "red";

    document.getElementById("volume").innerText =
      (vol / 1e6).toFixed(1) + "M";

    document.getElementById("rsi").innerText =
      rsi.toFixed(1);

    const high = meta.regularMarketDayHigh ?? 0;
    const low = meta.regularMarketDayLow ?? 0;

    document.getElementById("hl").innerText =
      high.toFixed(2) + " / " + low.toFixed(2);

    lastPrice = price;

  } catch (e) {
    console.log("error", e);
  }
}

// 🔔 ALARM ENGINE (CANLI)
function checkAlarm() {
  const alarm = localStorage.getItem("alarm_AEFES");
  if (!alarm) return;

  const target = parseFloat(alarm);

  if (lastPrice >= target) {
    alert("🚨 AEFES alarm tetiklendi: " + target);

    if (Notification.permission === "granted") {
      new Notification("AEFES Alarm", {
        body: "Fiyat hedefe ulaştı: " + target
      });
    }

    localStorage.removeItem("alarm_AEFES");
  }
}

// 🔔 ALARM KUR
function setAlarm() {
  const val = document.getElementById("alarmInput").value;
  if (!val) return;

  localStorage.setItem("alarm_AEFES", val);
  document.getElementById("alarmStatus").innerText =
    "Alarm: " + val + " ₺";

  if (Notification.permission === "default") {
    Notification.requestPermission();
  }
}

// 🚀 LOOP ENGINE
setInterval(() => {
  fetchStock();
  checkAlarm();
}, 15000); // 15 saniye

// INIT
window.onload = () => {
  fetchStock();
  if (Notification.permission === "default") {
    Notification.requestPermission();
  }
};

</script>

</body>
</html>
