<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BIST AI Tracker | Portföy</title>

<link rel="stylesheet" href="assets/css/style.css">


<style>

.portfolio-container{

max-width:1200px;
margin:auto;
padding:40px 20px;

}


.summary{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;

}


.summary-card{

background:#1e293b;
padding:25px;
border-radius:16px;

}


.summary-card h3{

color:#94a3b8;
font-size:15px;

}


.summary-card p{

font-size:28px;
font-weight:bold;
margin-top:10px;

}



.form-card{

background:#1e293b;
padding:25px;
border-radius:16px;
margin-bottom:30px;

}


input{

background:#334155;
border:none;
color:white;
padding:12px;
border-radius:8px;
margin:5px;
width:150px;

}


button{

background:#4f46e5;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;

}


button:hover{

opacity:.85;

}



table{

width:100%;
border-collapse:collapse;

}


th,td{

padding:15px;
text-align:center;
border-bottom:1px solid #334155;

}


.green{

color:#22c55e;

}


.red{

color:#ef4444;

}


@media(max-width:700px){

table{

font-size:12px;

}


input{

width:100%;

}

}



</style>

</head>



<body>



<div class="portfolio-container">


<h1>
📊 Portföy Yönetimi
</h1>


<p style="color:#94a3b8;margin-bottom:30px">

BIST AI Tracker kişisel yatırım takip sistemi

</p>




<div class="summary">


<div class="summary-card">

<h3>Toplam Değer</h3>

<p id="totalValue">

0 ₺

</p>

</div>



<div class="summary-card">

<h3>Toplam Maliyet</h3>

<p id="totalCost">

0 ₺

</p>

</div>



<div class="summary-card">

<h3>Kâr / Zarar</h3>

<p id="totalProfit">

0 ₺

</p>

</div>



<div class="summary-card">

<h3>Getiri</h3>

<p id="totalPercent">

%0

</p>

</div>


</div>





<div class="form-card">


<h2>
➕ Hisse Ekle
</h2>


<input id="symbol" placeholder="Hisse">

<input id="lot" type="number" placeholder="Lot">


<input id="buyPrice" type="number" placeholder="Alış fiyatı">


<input id="currentPrice" type="number" placeholder="Güncel fiyat">


<button onclick="addStock()">

Ekle

</button>



</div>





<div class="form-card">


<h2>
📈 Portföy
</h2>


<table>


<thead>

<tr>

<th>Hisse</th>

<th>Lot</th>

<th>Maliyet</th>

<th>Güncel</th>

<th>Değer</th>

<th>K/Z</th>

<th>İşlem</th>

</tr>


</thead>



<tbody id="portfolioTable">


</tbody>


</table>



</div>



</div>





<script>


let portfolio =
JSON.parse(localStorage.getItem("bistPortfolio"))
|| [];




function save(){

localStorage.setItem(
"bistPortfolio",
JSON.stringify(portfolio)
);

}





function addStock(){


const stock={


symbol:
document.getElementById("symbol").value.toUpperCase(),


lot:
Number(document.getElementById("lot").value),


buy:
Number(document.getElementById("buyPrice").value),


price:
Number(document.getElementById("currentPrice").value)


};



if(!stock.symbol || !stock.lot || !stock.buy){

alert("Bilgileri doldurun");

return;

}



portfolio.push(stock);


save();


render();


}





function deleteStock(index){


portfolio.splice(index,1);


save();


render();


}





function updatePrice(index,value){


portfolio[index].price=
Number(value);


save();


render();


}





function render(){


let html="";


let totalValue=0;

let totalCost=0;




portfolio.forEach((stock,index)=>{


let cost =
stock.buy*stock.lot;


let value =
stock.price*stock.lot;


let profit =
value-cost;



totalValue+=value;

totalCost+=cost;



html+=`

<tr>


<td>
${stock.symbol}
</td>


<td>
${stock.lot}
</td>


<td>
${cost.toFixed(2)} ₺
</td>



<td>

<input

value="${stock.price}"

onchange="updatePrice(${index},this.value)"

>

</td>



<td>
${value.toFixed(2)} ₺
</td>



<td class="${profit>=0?'green':'red'}">

${profit.toFixed(2)} ₺

</td>



<td>

<button onclick="deleteStock(${index})">

Sil

</button>

</td>


</tr>


`;


});




document.getElementById("portfolioTable").innerHTML=
html;




let profit=
totalValue-totalCost;



document.getElementById("totalValue").textContent=
totalValue.toFixed(2)+" ₺";



document.getElementById("totalCost").textContent=
totalCost.toFixed(2)+" ₺";



document.getElementById("totalProfit").textContent=
profit.toFixed(2)+" ₺";



document.getElementById("totalPercent").textContent=

totalCost
?
((profit/totalCost)*100).toFixed(2)+"%"
:
"%0";



}



render();


</script>



</body>

</html>
