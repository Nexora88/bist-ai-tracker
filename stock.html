<script>

// ================= AYARLAR =================

const SYMBOL =
new URLSearchParams(window.location.search)
.get("symbol")
?.toUpperCase() || "AEFES";



document.getElementById("symbol").textContent = SYMBOL;





// ================= SAAT VE PİYASA =================


function formatTime(ms){

    if(ms < 0) ms = 0;

    let total = Math.floor(ms / 1000);

    let h = Math.floor(total / 3600);

    let m = Math.floor((total % 3600) / 60);

    let s = total % 60;


    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;

}




function market(openHour,openMinute,closeHour,closeMinute){


    let now = new Date();


    let open = new Date(now);

    open.setHours(openHour,openMinute,0,0);



    let close = new Date(now);

    close.setHours(closeHour,closeMinute,0,0);



    if(now < open){

        return {

            status:"🟡 Açılışa Kalan",

            time:formatTime(open-now)

        };

    }



    if(now >= open && now < close){

        return {

            status:"🟢 Açık",

            time:"Kapanışa "+formatTime(close-now)

        };

    }



    open.setDate(open.getDate()+1);



    return {

        status:"🔴 Kapalı",

        time:"Açılışa "+formatTime(open-now)

    };

}




function updateMarket(){


    let now = new Date();


    document.getElementById("liveClock")
    .textContent =
    now.toLocaleTimeString("tr-TR");



    document.getElementById("todayDate")
    .textContent =
    now.toLocaleDateString("tr-TR");




    let bist =
    market(10,0,18,0);


    document.getElementById("bistStatus")
    .textContent=bist.status;


    document.getElementById("bistTimer")
    .textContent=bist.time;




    let nasdaq =
    market(16,30,23,0);


    document.getElementById("nasdaqStatus")
    .textContent=nasdaq.status;


    document.getElementById("nasdaqTimer")
    .textContent=nasdaq.time;




    let nyse =
    market(16,30,23,0);


    document.getElementById("nyseStatus")
    .textContent=nyse.status;


    document.getElementById("nyseTimer")
    .textContent=nyse.time;


}



setInterval(updateMarket,1000);

updateMarket();
