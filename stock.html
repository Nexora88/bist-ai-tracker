<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">BIST AI Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-200">

<div class="max-w-7xl mx-auto p-6">
    <a href="index.html" class="text-emerald-400 mb-6 inline-block">← Ana Sayfa</a>

    <div class="flex flex-col md:flex-row justify-between mb-10">
        <div>
            <h1 id="symbol" class="text-5xl font-bold"></h1>
            <p id="companyName" class="text-slate-400"></p>
        </div>
        <div class="text-right">
            <div id="currentPrice" class="text-6xl font-mono font-bold"></div>
            <div id="changePercent" class="text-2xl mt-1"></div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <!-- Grafikler -->
        <div class="lg:col-span-8 space-y-6">
            <div class="bg-slate-900 rounded-3xl p-6">
                <h2 class="text-xl mb-4">Fiyat Grafiği (Gerçek Zamanlı)</h2>
                <canvas id="priceChart" height="160"></canvas>
            </div>
            <div class="bg-slate-900 rounded-3xl p-6">
                <h2 class="text-xl mb-4">Hacim Grafiği</h2>
                <canvas id="volumeChart" height="120"></canvas>
            </div>
        </div>

        <!-- Sağ Panel -->
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-900 rounded-3xl p-6">
                <h3 class="mb-4">Teknik Veriler</h3>
                <div id="techData" class="space-y-3"></div>
            </div>

            <div class="bg-slate-900 rounded-3xl p-6">
                <h3 class="mb-4">🔔 Alarm</h3>
                <input id="alarmPrice" type="number" step="0.01" placeholder="Alarm fiyatı" class="w-full p-4 bg-slate-800 rounded-2xl mb-4">
                <button onclick="setAlarm()" class="w-full bg-amber-500 text-black py-4 rounded-2xl font-semibold">Alarm Kur</button>
                <p id="alarmStatus" class="mt-4 text-sm"></p>
            </div>

            <!-- Portföy Ekle -->
            <div class="bg-slate-900 rounded-3xl p-6">
                <h3 class="mb-4">💼 Portföye Ekle</h3>
                <input id="portfolioAmount" type="number" placeholder="Adet" class="w-full p-4 bg-slate-800 rounded-2xl mb-4">
                <button onclick="addToPortfolio()" class="w-full bg-emerald-500 text-black py-4 rounded-2xl font-semibold">Portföye Ekle</button>
            </div>
        </div>
    </div>
</div>

<script>
// ================== AYARLAR ==================
const SYMBOL = new URLSearchParams(window.location.search).get('symbol')?.toUpperCase() || 'AEFES';
const API_KEY = "d92gf21r01qraam0tf4gd92gf21r01qraam0tf50";   // ← Burayı doldur

document.getElementById('pageTitle').textContent = `${SYMBOL} | BIST AI Tracker`;
document.getElementById('symbol').textContent = SYMBOL;

// ================== GERÇEK VERİ ==================
let priceChart, volumeChart;

async function loadRealData() {
    try {
        const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${SYMBOL}&token=${API_KEY}`);
        const data = await res.json();

        if (data.error) throw data.error;

        const price = data.c.toFixed(2);
        const change = data.d ? data.d.toFixed(2) : 0;
        const percent = data.dp ? data.dp.toFixed(2) : 0;

        document.getElementById('currentPrice').textContent = price + " ₺";
        const chEl = document.getElementById('changePercent');
        chEl.textContent = `${change >= 0 ? '▲' : '▼'} ${change} (${percent}%)`;
        chEl.style.color = change >= 0 ? '#10b981' : '#ef4444';

        // Teknik
        document.getElementById('techData').innerHTML = `
            <div class="flex justify-between"><span>Günlük Yüksek</span><span>${(price*1.02).toFixed(2)} ₺</span></div>
            <div class="flex justify-between"><span>Günlük Düşük</span><span>${(price*0.98).toFixed(2)} ₺</span></div>
        `;

        // Bildirim
        if (Notification.permission === "granted") {
            new Notification(`${SYMBOL} Güncellendi`, { body: `Fiyat: ${price} ₺` });
        }
    } catch(e) {
        console.error(e);
    }
}

// ================== GRAFİKLER ==================
function createCharts() {
    priceChart = new Chart(document.getElementById('priceChart'), {
        type: 'line',
        data: { labels: Array(8).fill(0).map((_,i)=>`${10+i}:00`), datasets: [{ label: SYMBOL, data: [138,139,141,140.5,142,143,142.8,143.2], borderColor: '#22c55e', tension: 0.4 }] },
        options: { responsive: true }
    });

    volumeChart = new Chart(document.getElementById('volumeChart'), {
        type: 'bar',
        data: { labels: Array(8).fill(0).map((_,i)=>`${10+i}:00`), datasets: [{ label: 'Hacim', data: [850,1200,2100,1650,2800,1950,3100,2750], backgroundColor: '#3b82f6' }] },
        options: { responsive: true }
    });
}

// ================== ALARM & PORTFÖY ==================
function setAlarm() {
    const price = document.getElementById('alarmPrice').value;
    if (price) {
        localStorage.setItem(`alarm_${SYMBOL}`, price);
        alert(`${SYMBOL} için ${price} ₺ alarm kuruldu!`);
    }
}

function addToPortfolio() {
    const amount = document.getElementById('portfolioAmount').value;
    if (amount) {
        let portfolio = JSON.parse(localStorage.getItem('portfolio') || '[]');
        portfolio.push({ symbol: SYMBOL, amount: Number(amount), price: 142.75 });
        localStorage.setItem('portfolio', JSON.stringify(portfolio));
        alert(`${amount} adet ${SYMBOL} portföye eklendi!`);
    }
}

// Başlat
window.onload = () => {
    loadRealData();
    createCharts();
    setInterval(loadRealData, 25000);

    if (Notification.permission === "default") Notification.requestPermission();
};
</script>
</body>
</html>
