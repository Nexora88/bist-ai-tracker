// ================= SAAT VE PİYASA =================


function formatTime(ms){

    if(ms < 0) ms = 0;

    let total = Math.floor(ms / 1000);

    let h = Math.floor(total / 3600);

    let m = Math.floor((total % 3600) / 60);

    let s = total % 60;


    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;

}




function market(openHour,openMinute,closeHour,closeMinute){


    let now = new Date();


    let open = new Date(now);

    open.setHours(openHour,openMinute,0,0);



    let close = new Date(now);

    close.setHours(closeHour,closeMinute,0,0);



    if(now < open){

        return {

            status:"🟡 Açılışa Kalan",

            time:formatTime(open-now)

        };

    }



    if(now >= open && now < close){

        return {

            status:"🟢 Açık",

            time:"Kapanışa "+formatTime(close-now)

        };

    }



    open.setDate(open.getDate()+1);



    return {

        status:"🔴 Kapalı",

        time:"Açılışa "+formatTime(open-now)

    };

}




function updateMarket(){


    let now = new Date();


    document.getElementById("liveClock")
    .textContent =
    now.toLocaleTimeString("tr-TR");



    document.getElementById("todayDate")

}

StockPage.filterStocks=function(text){

    text=text.toUpperCase();

    const filtered=

    this.currentStocks.filter(stock=>

        stock.symbol.includes(text)

        ||

        stock.name.toUpperCase().includes(text)

    );

    this.renderStocks(filtered);

};

StockPage.sortByAI=function(){

    this.currentStocks.sort(

        (a,b)=>b.ai-a.ai

    );

    this.renderStocks(this.currentStocks);

};

StockPage.sortAlphabetic=function(){

    this.currentStocks.sort(

        (a,b)=>

        a.symbol.localeCompare(b.symbol)

    );

    this.renderStocks(this.currentStocks);

};
