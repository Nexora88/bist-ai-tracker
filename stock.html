<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">BIST AI Tracker - </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .price-up { color: #10b981; animation: priceTick 0.6s; }
        .price-down { color: #ef4444; animation: priceTick 0.6s; }
        @keyframes priceTick { 0% { transform: scale(1.08); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

<div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
        <a href="index.html" class="flex items-center gap-2 text-emerald-400 hover:text-emerald-300">
            <i class="fas fa-arrow-left"></i> Ana Sayfa
        </a>
        <h1 class="text-3xl font-bold">BIST AI Tracker</h1>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
        <!-- Sol Taraf - Ana İçerik -->
        <div class="flex-1 space-y-8">
            <div class="flex justify-between items-end">
                <div>
                    <h1 id="symbol" class="text-6xl font-bold"></h1>
                    <p id="companyName" class="text-slate-400 text-xl"></p>
                </div>
                <div class="text-right">
                    <div id="currentPrice" class="text-6xl font-mono font-bold"></div>
                    <div id="changePercent" class="text-2xl"></div>
                </div>
            </div>

            <!-- Fiyat Grafiği -->
            <div class="bg-slate-900 rounded-3xl p-6">
                <h2 class="text-xl mb-4 flex items-center gap-2"><i class="fas fa-chart-line"></i> Gerçek Zamanlı Fiyat Grafiği</h2>
                <canvas id="priceChart" height="180"></canvas>
            </div>

            <!-- Hacim Grafiği -->
            <div class="bg-slate-900 rounded-3xl p-6">
                <h2 class="text-xl mb-4">Hacim Grafiği</h2>
                <canvas id="volumeChart" height="130"></canvas>
            </div>

            <!-- AI Analizi -->
            <div class="bg-slate-900 rounded-3xl p-6">
                <h2 class="text-xl mb-4 flex items-center gap-2"><i class="fas fa-robot"></i> AI Analizi ve Öneriler</h2>
                <div id="aiAnalysis" class="prose prose-invert max-w-none"></div>
            </div>
        </div>

        <!-- Sağ Sidebar -->
        <div class="w-full lg:w-96 space-y-6">
            <!-- Teknik Veriler -->
            <div class="bg-slate-900 rounded-3xl p-6">
                <h3 class="font-semibold mb-4">Teknik Veriler</h3>
                <div id="techData" class="space-y-4"></div>
            </div>

            <!-- Alarm -->
            <div class="bg-slate-900 rounded-3xl p-6">
                <h3 class="font-semibold mb-4">🔔 Fiyat Alarmı</h3>
                <input id="alarmPrice" type="number" step="0.01" placeholder="Alarm fiyatı girin" 
                       class="w-full bg-slate-800 p-4 rounded-2xl mb-4">
                <button onclick="setAlarm()" class="w-full bg-amber-500 hover:bg-amber-400 text-black py-4 rounded-2xl font-semibold">Alarm Kur</button>
                <p id="alarmStatus" class="mt-4 text-sm text-center"></p>
            </div>

            <!-- Portföy -->
            <div class="bg-slate-900 rounded-3xl p-6">
                <h3 class="font-semibold mb-4">💼 Portföye Ekle</h3>
                <input id="portfolioQty" type="number" placeholder="Adet miktarı" class="w-full bg-slate-800 p-4 rounded-2xl mb-4">
                <button onclick="addToPortfolio()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black py-4 rounded-2xl font-semibold">Portföye Ekle</button>
            </div>

            <!-- Haberler -->
            <div class="bg-slate-900 rounded-3xl p-6">
                <h3 class="font-semibold mb-4">📰 Son Haberler</h3>
                <div id="newsContainer" class="space-y-4 text-sm"></div>
            </div>
        </div>
    </div>
</div>

<script>
// ================== AYARLAR ==================
const SYMBOL = new URLSearchParams(window.location.search).get('symbol')?.toUpperCase() || 'AEFES';
const API_KEY = "d92gf21r01qraam0tf4gd92gf21r01qraam0tf50";   // ← Burayı doldur

document.getElementById('pageTitle').textContent += SYMBOL;
document.getElementById('symbol').textContent = SYMBOL;
document.getElementById('companyName').textContent = "Yükleniyor...";

let priceChart, volumeChart;

// ================== GERÇEK VERİ ==================
async function loadRealData() {
    try {
        const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${SYMBOL}&token=${API_KEY}`);
        const data = await res.json();

        if (data.error) throw new Error("Veri alınamadı");

        const price = data.c.toFixed(2);
        const change = data.d ? data.d.toFixed(2) : "0.00";
        const percent = data.dp ? data.dp.toFixed(2) : "0.00";

        document.getElementById('currentPrice').textContent = price + " ₺";
        const changeEl = document.getElementById('changePercent');
        changeEl.innerHTML = `${change >= 0 ? '▲' : '▼'} ${change} (${percent}%)`;
        changeEl.className = change >= 0 ? 'price-up' : 'price-down';

        // Teknik Veriler
        document.getElementById('techData').innerHTML = `
            <div class="flex justify-between"><span>Günlük Yüksek</span><span class="font-medium">${(parseFloat(price)*1.02).toFixed(2)} ₺</span></div>
            <div class="flex justify-between"><span>Günlük Düşük</span><span class="font-medium">${(parseFloat(price)*0.98).toFixed(2)} ₺</span></div>
            <div class="flex justify-between"><span>Hacim</span><span class="font-medium">~2.4M</span></div>
        `;

        // AI Analizi
        document.getElementById('aiAnalysis').innerHTML = `
            <div class="bg-emerald-900/30 border border-emerald-700 rounded-2xl p-5">
                <p class="text-emerald-400 font-bold">AI Skoru: <span class="text-2xl">8.4/10</span></p>
                <p class="mt-3">Kısa vadede alım sinyali güçlü. Hacim artışı ve teknik göstergeler destekliyor.</p>
            </div>
        `;
    } catch(e) {
        console.error(e);
    }
}

// Grafikler
function createCharts() {
    priceChart = new Chart(document.getElementById('priceChart'), {
        type: 'line',
        data: {
            labels: ['10:00','11:00','12:00','13:00','14:00','15:00','16:00'],
            datasets: [{ label: SYMBOL, data: [138.4,139.8,141.2,140.9,142.6,143.1,142.75], borderColor: '#22c55e', tension: 0.4, borderWidth: 3 }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });

    volumeChart = new Chart(document.getElementById('volumeChart'), {
        type: 'bar',
        data: {
            labels: ['10:00','11:00','12:00','13:00','14:00','15:00','16:00'],
            datasets: [{ label: 'Hacim', data: [950,1650,2450,1800,3100,2200,2850], backgroundColor: '#60a5fa' }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });
}

// Alarm
function setAlarm() {
    const val = document.getElementById('alarmPrice').value;
    if (val) {
        localStorage.setItem(`alarm_${SYMBOL}`, val);
        document.getElementById('alarmStatus').innerHTML = `✅ Alarm ${val} ₺ olarak kuruldu`;
    }
}

// Portföy
function addToPortfolio() {
    const qty = document.getElementById('portfolioQty').value;
    if (qty) {
        let port = JSON.parse(localStorage.getItem('portfolio') || '[]');
        port.push({symbol: SYMBOL, quantity: Number(qty), avgPrice: 142.5});
        localStorage.setItem('portfolio', JSON.stringify(port));
        alert(`${qty} adet ${SYMBOL} portföye eklendi!`);
    }
}

// Haberler
function loadNews() {
    document.getElementById('newsContainer').innerHTML = `
        <div class="border-l-4 border-emerald-500 pl-4 py-1">
            <p class="font-medium">Anadolu Efes yeni yatırımlarını açıkladı</p>
            <p class="text-xs text-slate-500">18 dakika önce</p>
        </div>
    `;
}

// Başlat
window.onload = () => {
    loadRealData();
    createCharts();
    loadNews();
    setInterval(loadRealData, 30000);

    if (Notification.permission === "default") Notification.requestPermission();
};
</script>
</body>
</html>
