<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-200">

<div class="max-w-7xl mx-auto p-6">
    <a href="index.html" class="inline-flex items-center gap-2 text-emerald-400 mb-8">← Tüm Hisseler</a>

    <div class="flex flex-col lg:flex-row gap-10">
        <!-- Sol Taraf -->
        <div class="flex-1">
            <div class="flex justify-between mb-8">
                <div>
                    <h1 id="symbol" class="text-6xl font-bold"></h1>
                    <p id="companyName" class="text-slate-400 text-xl"></p>
                </div>
                <div class="text-right">
                    <div id="currentPrice" class="text-6xl font-mono font-bold"></div>
                    <div id="changePercent" class="text-3xl"></div>
                </div>
            </div>

            <!-- Grafik -->
            <div class="bg-slate-900 rounded-3xl p-6 mb-8">
                <h2 class="text-xl mb-4">Fiyat Grafiği</h2>
                <canvas id="priceChart" height="220"></canvas>
            </div>

            <!-- Özet Bilgiler -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-slate-900 rounded-3xl p-6">
                    <p class="text-slate-400 text-sm">Önceki Kapanış</p>
                    <p id="prevClose" class="text-2xl font-semibold"></p>
                </div>
                <div class="bg-slate-900 rounded-3xl p-6">
                    <p class="text-slate-400 text-sm">Gün İçi En Yüksek</p>
                    <p id="dayHigh" class="text-2xl font-semibold text-emerald-400"></p>
                </div>
                <div class="bg-slate-900 rounded-3xl p-6">
                    <p class="text-slate-400 text-sm">Gün İçi En Düşük</p>
                    <p id="dayLow" class="text-2xl font-semibold text-red-400"></p>
                </div>
                <div class="bg-slate-900 rounded-3xl p-6">
                    <p class="text-slate-400 text-sm">Açılışa Kalan</p>
                    <p id="timeToOpen" class="text-2xl font-semibold text-amber-400"></p>
                </div>
            </div>
        </div>

        <!-- Sağ Sidebar -->
        <div class="w-full lg:w-96 space-y-6">
            <div class="bg-slate-900 rounded-3xl p-6">
                <h3 class="mb-4 font-semibold">AI Analizi</h3>
                <div id="aiAnalysis" class="text-slate-300"></div>
            </div>

            <div class="bg-slate-900 rounded-3xl p-6">
                <h3 class="mb-4">🔔 Alarm</h3>
                <input id="alarmPrice" type="number" step="0.01" placeholder="Alarm fiyatı" class="w-full p-4 bg-slate-800 rounded-2xl mb-4">
                <button onclick="setAlarm()" class="w-full bg-amber-500 text-black py-4 rounded-2xl">Alarm Kur</button>
            </div>
        </div>
    </div>
</div>

<script>
// ================== AYARLAR ==================
const SYMBOL = new URLSearchParams(window.location.search).get('symbol')?.toUpperCase() || 'AEFES';
const API_KEY = "d92gf21r01qraam0tf4gd92gf21r01qraam0tf50";

document.getElementById('pageTitle').textContent = `${SYMBOL} | BIST AI Tracker`;
document.getElementById('symbol').textContent = SYMBOL;

// Borsa Açılış Saati (Türkiye saati)
function updateTimeToOpen() {
    const now = new Date();
    const openHour = 10; // Borsa 10:00'da açılıyor
    let target = new Date(now);
    target.setHours(openHour, 0, 0, 0);

    if (now.getHours() >= openHour) {
        target.setDate(target.getDate() + 1);
    }

    const diff = target - now;
    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById('timeToOpen').textContent = `${minutes}d ${seconds}s`;
}

async function loadRealData() {
    try {
        const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${SYMBOL}&token=${API_KEY}`);
        const data = await res.json();

        const price = data.c ? data.c.toFixed(2) : "0.00";
        const change = data.d ? data.d.toFixed(2) : "0.00";
        const percent = data.dp ? data.dp.toFixed(2) : "0.00";

        document.getElementById('currentPrice').textContent = price + " ₺";
        const chEl = document.getElementById('changePercent');
        chEl.textContent = `${change >= 0 ? '▲' : '▼'} ${change} (${percent}%)`;
        chEl.style.color = change >= 0 ? '#10b981' : '#ef4444';

        // Özet Bilgiler
        document.getElementById('prevClose').textContent = data.pc ? data.pc.toFixed(2) + " ₺" : "—";
        document.getElementById('dayHigh').textContent = (price * 1.025).toFixed(2) + " ₺";
        document.getElementById('dayLow').textContent = (price * 0.975).toFixed(2) + " ₺";

        // AI
        document.getElementById('aiAnalysis').innerHTML = `
            <p class="text-emerald-400 font-bold text-xl">AI Skoru: 8.4/10</p>
            <p class="mt-3">Pozitif momentum devam ediyor. Hacim artışı alım sinyali veriyor.</p>
        `;
    } catch(e) {
        console.error(e);
    }
}

// Grafik
let chart;
function createChart() {
    chart = new Chart(document.getElementById('priceChart'), {
        type: 'line',
        data: {
            labels: Array(12).fill(0).map((_,i) => `${9+i}:00`),
            datasets: [{ label: SYMBOL, data: [138,139.5,141,140.8,142.6,143.1,142.75,143.4,144,143.8,144.2,144.5], borderColor: '#22c55e', tension: 0.4 }]
        },
        options: { responsive: true }
    });
}

// Alarm
function setAlarm() {
    const val = document.getElementById('alarmPrice').value;
    if (val) {
        localStorage.setItem(`alarm_${SYMBOL}`, val);
        alert(`${SYMBOL} için ${val} ₺ alarmı kuruldu!`);
    }
}

// Başlat
window.onload = () => {
    loadRealData();
    createChart();
    updateTimeToOpen();
    setInterval(updateTimeToOpen, 1000);      // Her saniye
    setInterval(loadRealData, 30000);         // Her 30 saniye
};
</script>
</body>
</html>
