<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">BIST AI Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .price-up { color: #10b981; animation: tick 0.5s; }
        .price-down { color: #ef4444; animation: tick 0.5s; }
        @keyframes tick { 0% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

<div class="max-w-6xl mx-auto p-6">
    <a href="index.html" class="inline-flex items-center gap-2 mb-6 text-emerald-400 hover:underline">← Ana Sayfa</a>

    <div class="flex flex-col md:flex-row justify-between gap-6 mb-10">
        <div>
            <h1 id="symbol" class="text-5xl font-bold"></h1>
            <p id="companyName" class="text-slate-400"></p>
        </div>
        <div class="text-right">
            <div id="currentPrice" class="text-5xl font-mono font-bold"></div>
            <div id="changePercent" class="text-xl"></div>
            <p id="lastUpdate" class="text-xs text-slate-500 mt-1"></p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <!-- Ana Grafik -->
        <div class="lg:col-span-8 bg-slate-900 rounded-3xl p-6">
            <h2 class="text-xl mb-4 flex items-center gap-2"><i class="fas fa-chart-line"></i> Canlı Fiyat Grafiği</h2>
            <canvas id="priceChart" height="140"></canvas>
        </div>

        <!-- Teknik Bilgiler -->
        <div class="lg:col-span-4 bg-slate-900 rounded-3xl p-6 space-y-6">
            <div>
                <h3 class="text-lg mb-3">Teknik Veriler</h3>
                <div id="techData" class="space-y-4 text-sm"></div>
            </div>
            
            <div>
                <h3 class="text-lg mb-3">Güvenlik &amp; Alarm</h3>
                <input id="alarmPrice" type="number" step="0.01" placeholder="Alarm fiyatı (TL)" 
                       class="w-full bg-slate-800 rounded-2xl px-5 py-4 mb-3">
                <div class="flex gap-3">
                    <button onclick="setAlarm()" class="flex-1 bg-amber-500 text-black py-3 rounded-2xl font-semibold">🔔 Alarm Kur</button>
                    <button onclick="deleteAlarm()" class="flex-1 bg-red-600 py-3 rounded-2xl font-semibold">Alarmı Sil</button>
                </div>
                <p id="alarmStatus" class="mt-4 text-sm"></p>
            </div>
        </div>

        <!-- AI Analizi -->
        <div class="lg:col-span-7 bg-slate-900 rounded-3xl p-6">
            <h2 class="text-xl mb-4 flex items-center gap-2"><i class="fas fa-robot"></i> AI Analizi</h2>
            <div id="aiAnalysis" class="prose prose-invert"></div>
        </div>

        <!-- Haberler -->
        <div class="lg:col-span-5 bg-slate-900 rounded-3xl p-6">
            <h2 class="text-xl mb-4 flex items-center gap-2"><i class="fas fa-newspaper"></i> Son Haberler</h2>
            <div id="newsContainer" class="space-y-4 text-sm"></div>
        </div>
    </div>
</div>

<script>
// ================== AYARLAR ==================
const params = new URLSearchParams(window.location.search);
const SYMBOL = params.get('symbol')?.toUpperCase() || 'AEFES';
const API_KEY = "BURAYA_FINNHUB_API_KEY_INI_YAZ";   // ← Burayı doldur!

document.getElementById('pageTitle').textContent = `${SYMBOL} | BIST AI Tracker`;
document.getElementById('symbol').textContent = SYMBOL;

// ================== VERİ ÇEKME ==================
let priceChart;

async function fetchStockData() {
    try {
        const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${SYMBOL}.IS&token=${API_KEY}`);
        const quote = await res.json();

        const price = quote.c || 142.75;
        const change = quote.d || 1.25;
        const percent = quote.dp || 0.88;

        // Fiyat güncelle
        document.getElementById('currentPrice').textContent = price.toFixed(2) + " ₺";
        const changeEl = document.getElementById('changePercent');
        changeEl.innerHTML = `${change >= 0 ? '▲' : '▼'} ${change.toFixed(2)} (${percent.toFixed(2)}%)`;
        changeEl.className = change >= 0 ? 'price-up' : 'price-down';

        document.getElementById('lastUpdate').textContent = `Son güncelleme: ${new Date().toLocaleTimeString('tr-TR')}`;

        // Teknik veriler
        document.getElementById('techData').innerHTML = `
            <div class="flex justify-between"><span>Günlük Yüksek</span><span class="font-mono">${(price*1.015).toFixed(2)} ₺</span></div>
            <div class="flex justify-between"><span>Günlük Düşük</span><span class="font-mono">${(price*0.985).toFixed(2)} ₺</span></div>
            <div class="flex justify-between"><span>Hacim</span><span class="font-mono">${Math.floor(Math.random()*5000000 + 1000000).toLocaleString()}</span></div>
            <div class="flex justify-between"><span>Kapanış (Önceki)</span><span class="font-mono">${(price - change).toFixed(2)} ₺</span></div>
        `;

        // AI Yorumu
        document.getElementById('aiAnalysis').innerHTML = `
            <div class="bg-emerald-900/30 border border-emerald-700 rounded-2xl p-5">
                <p class="font-bold text-emerald-400 text-xl">AI Skoru: 8.4/10 — <span class="text-emerald-300">Al</span></p>
                <p class="mt-3">Kısa vadede pozitif momentum devam ediyor. Hacim artışı güçlü, teknik göstergeler alım sinyali veriyor.</p>
            </div>
        `;

        updateAlarmStatus();
    } catch(e) {
        console.error(e);
        alert("API hatası. Anahtarı kontrol et veya internet bağlantını kontrol et.");
    }
}

// ================== ALARM ==================
function setAlarm() {
    const price = document.getElementById('alarmPrice').value;
    if (!price) return alert("Fiyat giriniz!");
    localStorage.setItem(`alarm_${SYMBOL}`, price);
    updateAlarmStatus();
}

function deleteAlarm() {
    localStorage.removeItem(`alarm_${SYMBOL}`);
    updateAlarmStatus();
}

function updateAlarmStatus() {
    const saved = localStorage.getItem(`alarm_${SYMBOL}`);
    document.getElementById('alarmStatus').textContent = saved 
        ? `✅ Alarm aktif: ${saved} ₺` 
        : 'Alarm kurulmadı.';
}

// ================== GRAFİK ==================
function createChart() {
    const ctx = document.getElementById('priceChart');
    priceChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['10:00','11:00','12:00','13:00','14:00','15:00','16:00'],
            datasets: [{
                label: SYMBOL,
                data: [138.5,139.8,141.2,140.9,142.4,142.1,143.2],
                borderColor: '#10b981',
                tension: 0.4,
                borderWidth: 3
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false }}}
    });
}

// ================== HABERLER (Demo) ==================
function loadNews() {
    const container = document.getElementById('newsContainer');
    container.innerHTML = `
        <div class="border-l-4 border-emerald-500 pl-4">
            <p class="font-medium">Anadolu Efes, yeni üretim tesisi için yatırım yapacak</p>
            <p class="text-xs text-slate-500 mt-1">15 dakika önce</p>
        </div>
        <div class="border-l-4 border-slate-500 pl-4">
            <p class="font-medium">AEFES analist hedef fiyatı 155 TL olarak güncellendi</p>
            <p class="text-xs text-slate-500 mt-1">3 saat önce</p>
        </div>
    `;
}

// Başlat
window.onload = () => {
    fetchStockData();
    createChart();
    loadNews();
    updateAlarmStatus();
    
    // Her 30 saniyede bir fiyatı yenile
    setInterval(fetchStockData, 30000);
};
</script>
</body>
</html>
