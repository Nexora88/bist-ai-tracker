<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIST AI Tracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f172a; color:white; font-family:Arial, sans-serif; }
body.light { background:#f8fafc; color:#1e2937; }

.navbar { background:#111827; padding:15px; display:flex; gap:20px; align-items:center; }
body.light .navbar { background:#e2e8f0; color:#1e2937; }

.container { padding:20px; }
.card { background:#111827; border:1px solid #1f2937; border-radius:12px; padding:15px; margin-bottom:20px; }
body.light .card { background:white; border-color:#cbd5e1; }

.stock-container { display:flex; gap:15px; overflow-x:auto; padding:15px 0; scroll-behavior:smooth; }
.stock-card { min-width:290px; background:#111827; border:1px solid #1f2937; border-radius:12px; padding:15px; cursor:pointer; }
body.light .stock-card { background:white; border-color:#cbd5e1; }

.followBtn, .alarmBtn { width:100%; margin-top:8px; padding:9px; border:none; border-radius:8px; cursor:pointer; }
.followBtn { background:#2563eb; color:white; }
.followBtn.active { background:#16a34a; }
.alarmBtn { background:#eab308; color:black; }

.theme-toggle { margin-left:auto; padding:8px 16px; background:#334155; border:none; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<div class="navbar">
    <a href="#">Ana Sayfa</a>
    <a href="#">Portföy</a>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="container">
    <h1>📈 BIST AI Tracker</h1>

    <input id="searchInput" placeholder="Hisse ara..." 
           style="width:100%; padding:14px; margin:15px 0; border-radius:10px; background:#1e2937; color:white;">

    <div class="stock-container" id="hisseListesi"></div>

    <div class="card">
        <h2>⭐ Takip Edilenler (<span id="takipSayisi">0</span>)</h2>
        <ul id="takipListesi" style="list-style:none;"></ul>
    </div>

    <div class="card">
        <h2>💼 Portföy</h2>
        <input id="pKod" placeholder="Kod" style="padding:8px;width:25%;">
        <input id="pAdet" type="number" placeholder="Adet" style="padding:8px;width:20%;">
        <input id="pAlis" type="number" placeholder="Alış Fiyatı" style="padding:8px;width:25%;">
        <button onclick="addPortfolio()">Ekle</button>
        <table style="width:100%;margin-top:15px;border-collapse:collapse;" id="portTable">
            <thead><tr><th>Kod</th><th>Adet</th><th>Alış</th><th>Güncel</th><th>Değer</th><th>K/Z</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let portfolio = JSON.parse(localStorage.getItem('bistPortfolio')) || [];
let takipte = JSON.parse(localStorage.getItem('takipListesi')) || [];

// Tema
function toggleTheme() { document.body.classList.toggle('light'); }

// ====================== GERÇEK FİYAT (Hafta sonu da çalışır) ======================
async function fetchPrice(kod) {
    try {
        const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${kod}.IS?interval=1d`);
        const data = await res.json();
        const result = data.chart.result[0];
        const meta = result.meta;
        const quote = result.indicators.quote[0];

        const price = meta.regularMarketPrice || meta.chartPreviousClose || quote.close[quote.close.length-1];
        const previousClose = meta.chartPreviousClose || quote.close[0];
        const change = previousClose ? ((price - previousClose) / previousClose * 100).toFixed(2) : "0";

        return {
            price: parseFloat(price).toFixed(2),
            change: change
        };
    } catch(e) {
        return {price: "?.??", change: "0"};
    }
}

// ====================== HİSSELER ======================
const bistHisseler = ["THYAO","ASELS","TUPRS","KCHOL","EREGL","AKBNK","GARAN","ISCTR","SAHOL","YKBNK","BIMAS","FROTO","PETKM","TCELL","SISE","KOZAL","GUBRF","EKGYO","HALKB","VAKBN","SASA","HEKTS","TKFEN","ALARK","KRDMD","VESBE","TOASO","AYGAZ","ENJSA","PGSUS"];

async function loadStocks() {
    const container = document.getElementById("hisseListesi");
    container.innerHTML = "";

    for (let kod of bistHisseler) {
        const data = await fetchPrice(kod);

        const card = document.createElement("div");
        card.className = "stock-card";
        card.innerHTML = `
            <h3>${kod}</h3>
            <p style="font-size:1.5em; margin:8px 0;">${data.price} ₺</p>
            <p class="${parseFloat(data.change) >= 0 ? 'positive' : 'negative'}">
                ${parseFloat(data.change) >= 0 ? '+' : ''}${data.change}%
            </p>
            <button class="followBtn" data-kod="${kod}">⭐ Takip Et</button>
            <button class="alarmBtn" data-kod="${kod}">🔔 Alarm</button>
        `;

        card.onclick = (e) => {
            if (!e.target.classList.contains('followBtn') && !e.target.classList.contains('alarmBtn')) {
                window.location.href = `${kod.toLowerCase()}.html`;
            }
        };

        container.appendChild(card);
    }

    // Butonlar
    document.querySelectorAll('.followBtn').forEach(btn => {
        const kod = btn.dataset.kod;
        if (takipte.includes(kod)) {
            btn.classList.add('active');
            btn.textContent = '✅ Takip Ediliyor';
        }
        btn.addEventListener('click', e => { e.stopImmediatePropagation(); toggleTakip(kod, btn); });
    });

    document.querySelectorAll('.alarmBtn').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopImmediatePropagation();
            setAlarm(btn.dataset.kod);
        });
    });
}

function toggleTakip(kod, btn) {
    if (takipte.includes(kod)) {
        takipte = takipte.filter(k => k !== kod);
        btn.classList.remove('active');
        btn.textContent = '⭐ Takip Et';
    } else {
        takipte.push(kod);
        btn.classList.add('active');
        btn.textContent = '✅ Takip Ediliyor';
    }
    localStorage.setItem('takipListesi', JSON.stringify(takipte));
    updateTakipListesi();
}

function updateTakipListesi() {
    const liste = document.getElementById("takipListesi");
    liste.innerHTML = "";
    document.getElementById("takipSayisi").textContent = takipte.length;

    takipte.forEach(kod => {
        const li = document.createElement("li");
        li.style.padding = "10px";
        li.style.margin = "5px 0";
        li.style.background = "#1e2937";
        li.style.borderRadius = "6px";
        li.innerHTML = `<a href="${kod.toLowerCase()}.html" style="color:white;">${kod}</a>`;
        liste.appendChild(li);
    });
}

function setAlarm(kod) {
    const price = prompt(`${kod} için alarm fiyatı girin:`);
    if (price) {
        localStorage.setItem(`alarm_${kod}`, price);
        alert(`${kod} için ${price} ₺ alarm kuruldu!`);
    }
}

// Portföy (kısaltıldı)
function addPortfolio() {
    const kod = document.getElementById("pKod").value.trim().toUpperCase();
    const adet = parseFloat(document.getElementById("pAdet").value);
    const alis = parseFloat(document.getElementById("pAlis").value);
    if (!kod || !adet || !alis) return alert("Tüm alanları doldurun!");
    portfolio.push({kod, adet, alis});
    localStorage.setItem('bistPortfolio', JSON.stringify(portfolio));
    renderPortfolio();
}

function renderPortfolio() {
    const tbody = document.querySelector("#portTable tbody");
    tbody.innerHTML = portfolio.map((p, i) => `
        <tr>
            <td>${p.kod}</td>
            <td>${p.adet}</td>
            <td>${p.alis}</td>
            <td>---</td><td>---</td><td>---</td>
            <td><button onclick="deletePortfolio(${i})" style="color:red;">Sil</button></td>
        </tr>
    `).join('');
}

window.deletePortfolio = function(i) {
    portfolio.splice(i,1);
    localStorage.setItem('bistPortfolio', JSON.stringify(portfolio));
    renderPortfolio();
};

// Arama
document.getElementById("searchInput").addEventListener("input", function() {
    const filter = this.value.toUpperCase();
    document.querySelectorAll(".stock-card").forEach(card => {
        card.style.display = card.textContent.includes(filter) ? "block" : "none";
    });
});

window.onload = () => {
    loadStocks();
    updateTakipListesi();
    renderPortfolio();
};
</script>
</body>
</html>
