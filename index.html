<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIST AI Tracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f172a; color:white; font-family:Arial, sans-serif; }
body.light { background:#f8fafc; color:#1e2937; }

.navbar { background:#111827; padding:15px; display:flex; gap:20px; align-items:center; }
body.light .navbar { background:#e2e8f0; color:#1e2937; }

.container { padding:20px; }
.card { background:#111827; border:1px solid #1f2937; border-radius:12px; padding:15px; margin-bottom:20px; }
body.light .card { background:white; border-color:#cbd5e1; }

.stock-container {
    display:flex; 
    gap:15px; 
    overflow-x:auto; 
    padding:15px 0;
    scroll-behavior:smooth;
    white-space:nowrap;
}
.stock-card { 
    min-width:260px; 
    background:#111827; 
    border:1px solid #1f2937; 
    border-radius:12px; 
    padding:15px; 
    cursor:pointer; 
    display:inline-block;
}
body.light .stock-card { background:white; border-color:#cbd5e1; }
.stock-card:hover { transform:scale(1.05); }

.theme-toggle { margin-left:auto; padding:8px 16px; background:#334155; border:none; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<div class="navbar">
    <a href="#">Ana Sayfa</a>
    <a href="#">Portföy</a>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="container">
    <h1>📈 BIST AI Tracker</h1>

    <!-- BIST 30 Genel -->
    <div class="card">
        <h2>BIST 30 Endeksi</h2>
        <p style="color:#94a3b8; margin-top:10px;">TradingView grafik yükleniyor... (Eğer görünmüyorsa tarayıcıda TradingView engeli olabilir)</p>
        <div style="height:420px; margin-top:10px; background:#000;">
            <iframe src="https://www.tradingview.com/widgetembed/?symbol=BIST%3AXU030" 
                    width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <input id="searchInput" placeholder="Hisse ara..." 
           style="width:100%; padding:14px; margin:15px 0; border-radius:10px; background:#1e2937; color:white;">

    <!-- Hisseler Yatay Kaydırmalı -->
    <div class="stock-container" id="hisseListesi"></div>

    <!-- Portföy -->
    <div class="card">
        <h2>💼 Portföy</h2>
        <input id="pKod" placeholder="Kod" style="padding:8px;width:25%;">
        <input id="pAdet" type="number" placeholder="Adet" style="padding:8px;width:20%;">
        <input id="pAlis" type="number" placeholder="Alış Fiyatı" style="padding:8px;width:25%;">
        <button onclick="addPortfolio()">Ekle</button>

        <table style="width:100%;margin-top:15px;border-collapse:collapse;" id="portTable">
            <thead><tr><th>Kod</th><th>Adet</th><th>Alış</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let portfolio = JSON.parse(localStorage.getItem('bistPortfolio')) || [];

// Tema
function toggleTheme() { document.body.classList.toggle('light'); }

// Hisseler
const bistHisseler = ["THYAO","ASELS","TUPRS","KCHOL","EREGL","AKBNK","GARAN","ISCTR","SAHOL","YKBNK","BIMAS","FROTO","PETKM","TCELL","SISE","KOZAL","GUBRF","EKGYO","HALKB","VAKBN","SASA","HEKTS","TKFEN","ALARK","KRDMD","VESBE","TOASO","AYGAZ","ENJSA","PGSUS"];

function loadStocks() {
    const container = document.getElementById("hisseListesi");
    container.innerHTML = "";

    bistHisseler.forEach(kod => {
        const card = document.createElement("div");
        card.className = "stock-card";
        card.innerHTML = `
            <h3>${kod}</h3>
            <p style="color:#94a3b8; margin-top:8px;">Detay sayfasına git →</p>
        `;
        card.onclick = () => {
            window.location.href = `${kod.toLowerCase()}.html`;
        };
        container.appendChild(card);
    });
}

// Portföy
function addPortfolio() {
    const kod = document.getElementById("pKod").value.trim().toUpperCase();
    const adet = parseFloat(document.getElementById("pAdet").value);
    const alis = parseFloat(document.getElementById("pAlis").value);
    if (!kod || !adet || !alis) return alert("Tüm alanları doldurun!");

    portfolio.push({kod, adet, alis});
    localStorage.setItem('bistPortfolio', JSON.stringify(portfolio));
    renderPortfolio();
}

function renderPortfolio() {
    const tbody = document.querySelector("#portTable tbody");
    tbody.innerHTML = portfolio.map((p, i) => `
        <tr>
            <td>${p.kod}</td>
            <td>${p.adet}</td>
            <td>${p.alis}</td>
            <td><button onclick="deletePortfolio(${i})" style="color:red;">Sil</button></td>
        </tr>
    `).join('');
}

window.deletePortfolio = function(i) {
    portfolio.splice(i, 1);
    localStorage.setItem('bistPortfolio', JSON.stringify(portfolio));
    renderPortfolio();
};

// Arama
document.getElementById("searchInput").addEventListener("input", function() {
    const filter = this.value.toUpperCase();
    document.querySelectorAll(".stock-card").forEach(card => {
        card.style.display = card.textContent.includes(filter) ? "inline-block" : "none";
    });
});

window.onload = () => {
    loadStocks();
    renderPortfolio();
};
</script>
</body>
</html>
