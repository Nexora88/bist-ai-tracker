<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIST AI Tracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f172a; color:white; font-family:Arial, sans-serif; transition:0.3s; }
body.light { background:#f8fafc; color:#1e2937; }

.navbar { background:#111827; padding:15px; display:flex; gap:20px; align-items:center; }
body.light .navbar { background:#e2e8f0; }

.container { padding:20px; }
.card { background:#111827; border:1px solid #1f2937; border-radius:12px; padding:15px; margin-bottom:20px; }
body.light .card { background:white; border-color:#cbd5e1; }

.stock-card { 
    min-width:290px; 
    background:#111827; 
    border:1px solid #1f2937; 
    border-radius:12px; 
    padding:15px; 
    cursor:pointer;
    transition:0.2s;
}
body.light .stock-card { background:white; border-color:#cbd5e1; }
.stock-card:hover { transform: scale(1.03); }

.positive { color:#22c55e; }
.negative { color:#ef4444; }

.news-item { padding:10px; background:#1e2937; margin:8px 0; border-radius:8px; font-size:0.9em; }
body.light .news-item { background:#f1f5f9; }

.theme-toggle { margin-left:auto; padding:8px 16px; background:#334155; border:none; border-radius:8px; cursor:pointer; }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="navbar">
    <a href="#">Ana Sayfa</a>
    <a href="#">Portföy</a>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="container">
    <h1>📈 BIST AI Tracker</h1>
    <p style="color:#94a3b8;">Gerçek Zamanlı • Haber • Teknik • Portföy</p>

    <div class="card">
        <h2>BIST 30 Endeksi</h2>
        <p id="bist30Ort" style="font-size:1.4em;">Yükleniyor...</p>
    </div>

    <input id="searchInput" placeholder="Hisse ara (THYAO, ASELS, GARAN...)" 
           style="width:100%; padding:14px; margin:15px 0; border-radius:10px; background:#1e2937; color:white; font-size:1.1em;">

    <div id="hisseListesi" style="display:flex; gap:15px; overflow-x:auto; padding:10px 0;"></div>

    <!-- Detay Panel -->
    <div id="detailPanel" class="card" style="display:none;">
        <h2 id="detailTitle"></h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div>
                <h3>Teknik Bilgiler</h3>
                <p>Fiyat: <strong id="dPrice"></strong> ₺</p>
                <p>Hacim: <strong id="dVolume"></strong></p>
                <p>RSI(14): <strong id="dRSI"></strong></p>
                <p>Değişim: <strong id="dChange"></strong></p>
                <p>Yüksek / Düşük: <strong id="dHighLow"></strong></p>
                <button onclick="setAlarm()" style="margin-top:10px;">🔔 Alarm Kur</button>
            </div>
            <div>
                <h3>Son Haberler</h3>
                <div id="newsContainer"></div>
            </div>
        </div>
        <button onclick="closeDetail()" style="margin-top:15px;">Kapat</button>
    </div>

    <!-- Portföy -->
    <div class="card">
        <h2>💼 Portföy</h2>
        <input id="pKod" placeholder="Hisse Kodu" style="padding:8px;width:22%;">
        <input id="pAdet" type="number" placeholder="Adet" style="padding:8px;width:18%;">
        <input id="pAlis" type="number" placeholder="Alış Fiyatı" style="padding:8px;width:22%;">
        <button onclick="addPortfolio()">Ekle</button>

        <table style="width:100%; margin-top:15px; border-collapse:collapse;" id="portTable">
            <thead><tr><th>Kod</th><th>Adet</th><th>Alış</th><th>Güncel</th><th>Değer</th><th>K/Z</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
// ====================== AYARLAR ======================
let portfolio = JSON.parse(localStorage.getItem('bistPortfolio')) || [];

// Tema
function toggleTheme() {
    document.body.classList.toggle('light');
    localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

// ====================== VERİ ÇEKME ======================
async function fetchData(symbol) {
    try {
        const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d`);
        const json = await res.json();
        const r = json.chart.result[0];
        const meta = r.meta;
        const q = r.indicators.quote[0];
        const closes = q.close;

        let rsi = "N/A";
        if (closes.length >= 15) {
            let gain = 0, loss = 0;
            for (let i = 1; i <= 14; i++) {
                const diff = closes[closes.length-i] - closes[closes.length-i-1];
                if (diff > 0) gain += diff; else loss -= diff;
            }
            const rs = gain / (loss || 0.0001);
            rsi = (100 - 100 / (1 + rs)).toFixed(1);
        }

        return {
            price: meta.regularMarketPrice.toFixed(2),
            change: meta.regularMarketChangePercent.toFixed(2),
            volume: (q.volume[q.volume.length-1]/1000000).toFixed(1) + "M",
            high: meta.regularMarketDayHigh.toFixed(2),
            low: meta.regularMarketDayLow.toFixed(2),
            rsi
        };
    } catch(e) { return null; }
}

async function fetchNews(symbol) {
    try {
        const res = await fetch(`https://query1.finance.yahoo.com/v1/finance/search?q=${symbol.replace('.IS','')}&newsCount=5`);
        const data = await res.json();
        return data.news || [];
    } catch(e) { return []; }
}

// ====================== ANA SAYFA ======================
async function loadStocks() {
    const container = document.getElementById("hisseListesi");
    container.innerHTML = "";

    // Daha fazla BIST30 hissesi
    const symbols = [
        "THYAO.IS","ASELS.IS","TUPRS.IS","KCHOL.IS","EREGL.IS","AKBNK.IS","GARAN.IS",
        "ISCTR.IS","SAHOL.IS","YKBNK.IS","BIMAS.IS","FROTO.IS","PETKM.IS","TCELL.IS",
        "SISE.IS","KOZAL.IS","GUBRF.IS","EKGYO.IS","HALKB.IS","VAKBN.IS"
    ];

    for (let sym of symbols) {
        const data = await fetchData(sym);
        if (!data) continue;

        const card = document.createElement("div");
        card.className = "stock-card";
        card.innerHTML = `
            <h3>${sym.replace('.IS','')}</h3>
            <p style="font-size:1.6em; margin:8px 0;">${data.price} ₺</p>
            <p class="${parseFloat(data.change)>0 ? 'positive' : 'negative'}">
                ${parseFloat(data.change)>0 ? '+' : ''}${data.change}%
            </p>
        `;
        card.onclick = () => showDetail(sym, data);
        container.appendChild(card);
    }
}

async function showDetail(symbol, data) {
    document.getElementById("detailPanel").style.display = "block";
    document.getElementById("detailTitle").textContent = symbol.replace('.IS','') + " - Detay";

    document.getElementById("dPrice").textContent = data.price;
    document.getElementById("dVolume").textContent = data.volume;
    document.getElementById("dRSI").textContent = data.rsi;
    document.getElementById("dChange").innerHTML = `<span class="${parseFloat(data.change)>0?'positive':'negative'}">${parseFloat(data.change)>0?'+' : ''}${data.change}%</span>`;
    document.getElementById("dHighLow").textContent = `${data.high} / ${data.low}`;

    const news = await fetchNews(symbol);
    const container = document.getElementById("newsContainer");
    container.innerHTML = "";
    news.forEach(item => {
        const div = document.createElement("div");
        div.className = "news-item";
        div.innerHTML = `<a href="${item.link}" target="_blank" style="color:inherit;">${item.title}</a>`;
        container.appendChild(div);
    });
}

function closeDetail() {
    document.getElementById("detailPanel").style.display = "none";
}

function setAlarm() {
    const price = prompt("Alarm fiyatı girin:");
    if (price) alert("Alarm kuruldu! (Şimdilik sadece bilgilendirme)");
}

// ====================== PORTFÖY ======================
function addPortfolio() {
    const kodInput = document.getElementById("pKod").value.trim().toUpperCase();
    if (!kodInput) return alert("Hisse kodu girin!");

    const kod = kodInput.includes('.IS') ? kodInput : kodInput + ".IS";
    const adet = parseFloat(document.getElementById("pAdet").value);
    const alis = parseFloat(document.getElementById("pAlis").value);

    if (!adet || !alis) return alert("Adet ve alış fiyatı girin!");

    portfolio.push({kod, adet, alis});
    localStorage.setItem('bistPortfolio', JSON.stringify(portfolio));
    renderPortfolio();
}

async function renderPortfolio() {
    const tbody = document.querySelector("#portTable tbody");
    tbody.innerHTML = "";

    for (let item of portfolio) {
        const data = await fetchData(item.kod);
        if (!data) continue;

        const current = parseFloat(data.price);
        const value = (item.adet * current).toFixed(2);
        const cost = (item.adet * item.alis).toFixed(2);
        const pnl = (value - cost).toFixed(2);

        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${item.kod.replace('.IS','')}</td>
            <td>${item.adet}</td>
            <td>${item.alis}</td>
            <td>${current}</td>
            <td>${value}</td>
            <td class="${pnl>0?'positive':'negative'}">${pnl}</td>
            <td><button onclick="deletePortfolio('${item.kod}')" style="color:red;">Sil</button></td>
        `;
        tbody.appendChild(row);
    }
}

window.deletePortfolio = function(kod) {
    portfolio = portfolio.filter(p => p.kod !== kod);
    localStorage.setItem('bistPortfolio', JSON.stringify(portfolio));
    renderPortfolio();
};

// ====================== ARAMA ======================
document.getElementById("searchInput").addEventListener("input", function() {
    const filter = this.value.toLowerCase();
    document.querySelectorAll(".stock-card").forEach(card => {
        card.style.display = card.textContent.toLowerCase().includes(filter) ? "block" : "none";
    });
});

// BIST30
async function loadBist30() {
    try {
        const res = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/%5EBIST30?interval=1d');
        const data = await res.json();
        const change = data.chart.result[0].meta.regularMarketChangePercent.toFixed(2);
        document.getElementById("bist30Ort").textContent = (change >= 0 ? "+" : "") + change + "%";
    } catch(e) {
        document.getElementById("bist30Ort").textContent = "Veri alınamadı";
    }
}

// ====================== BAŞLAT ======================
window.onload = () => {
    loadStocks();
    loadBist30();
    renderPortfolio();
};
</script>
</body>
</html>
