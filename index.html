<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIST AI Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .stock-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .stock-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        .scroll-container::-webkit-scrollbar {
            height: 8px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #64748b;
            border-radius: 20px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <!-- Navbar -->
    <nav class="bg-slate-900 border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📈</span>
                <h1 class="text-2xl font-bold tracking-tight">BIST <span class="text-emerald-400">AI</span> Tracker</h1>
            </div>
            
            <div class="flex items-center gap-8 text-sm">
                <a href="index.html" class="hover:text-white transition-colors font-medium">Ana Sayfa</a>
                <a href="portfolio.html" class="hover:text-white transition-colors">💼 Portföy</a>
                <a href="ai-analiz.html" class="hover:text-white transition-colors">🤖 AI Merkezi</a>
                <button onclick="toggleTheme()" id="themeBtn" 
                        class="p-3 bg-slate-800 hover:bg-slate-700 rounded-2xl transition-colors">
                    🌙
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-10">
            <div>
                <h2 class="text-4xl font-bold mb-2">Borsa İstanbul Takip</h2>
                <p class="text-slate-400">Gerçek zamanlı fiyatlar • AI analizleri • Kişisel takip listesi</p>
            </div>
            
            <input id="searchInput" type="text" placeholder="Hisse ara... (AEFES, THYAO, GARAN...)"
                   class="mt-6 md:mt-0 w-full md:w-96 bg-slate-900 border border-slate-700 focus:border-emerald-500 rounded-3xl px-6 py-4 text-lg outline-none transition-colors">
        </div>

        <!-- Hisse Kartları -->
        <div class="flex items-center gap-4 mb-8">
            <button onclick="scrollLeft()" 
                    class="bg-slate-800 hover:bg-slate-700 w-14 h-14 flex items-center justify-center rounded-3xl text-2xl transition-colors flex-shrink-0">
                ←
            </button>
            
            <div id="hisseListesi" 
                 class="flex gap-6 overflow-x-auto scroll-container pb-6 flex-1 snap-x snap-mandatory">
                <!-- JavaScript ile doldurulacak -->
            </div>

            <button onclick="scrollRight()" 
                    class="bg-slate-800 hover:bg-slate-700 w-14 h-14 flex items-center justify-center rounded-3xl text-2xl transition-colors flex-shrink-0">
                →
            </button>
        </div>

        <!-- Takip Edilenler -->
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-semibold flex items-center gap-3">
                    ⭐ Takip Edilenler 
                    <span id="takipSayisi" class="bg-emerald-500 text-black text-sm font-bold px-4 py-1.5 rounded-full">0</span>
                </h2>
                <a href="stock.html?symbol=THYAO" class="text-emerald-400 hover:underline text-sm">Tümünü Gör →</a>
            </div>
            <ul id="takipListesi" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <!-- JS ile doldurulacak -->
            </ul>
        </div>
    </div>

<script>
// Tema
function toggleTheme() {
    document.documentElement.classList.toggle('light');
    const btn = document.getElementById('themeBtn');
    btn.textContent = document.documentElement.classList.contains('light') ? '☀️' : '🌙';
    localStorage.setItem('theme', document.documentElement.classList.contains('light') ? 'light' : 'dark');
}

// BIST Hisseleri
const bistHisseler = [
    "AEFES","AKBNK","ASELS","ASTOR","BIMAS","DSTKF","EKGYO","ENKAI","EREGL","FROTO",
    "GARAN","GUBRF","ISCTR","KCHOL","KRDMD","MGROS","PETKM","PGSUS","SAHOL","SASA",
    "SISE","TAVHL","TCELL","THYAO","TOASO","TRALT","TTKOM","TUPRS","VAKBN","YKBNK"
];

let takipte = JSON.parse(localStorage.getItem('takipListesi')) || [];

function loadStocks() {
    const container = document.getElementById("hisseListesi");
    container.innerHTML = "";

    bistHisseler.forEach(kod => {
        const isFollowed = takipte.includes(kod);
        
        const card = document.createElement("div");
        card.className = `stock-card bg-slate-900 border border-slate-700 rounded-3xl p-6 min-w-[270px] snap-center cursor-pointer`;
        card.innerHTML = `
            <div class="flex justify-between">
                <div>
                    <h3 class="text-3xl font-bold">${kod}</h3>
                    <p class="text-emerald-400 text-sm mt-1">BIST 30</p>
                </div>
                <span class="text-xs bg-slate-800 px-3 py-1 rounded-full self-start">AI</span>
            </div>
            
            <div class="mt-8 space-y-3">
                <button onclick="event.stopImmediatePropagation(); toggleTakip('${kod}', this)" 
                        class="w-full py-3.5 rounded-2xl text-sm font-semibold transition-all ${isFollowed ? 'bg-emerald-500 text-black' : 'bg-slate-800 hover:bg-slate-700'}">
                    ${isFollowed ? '✅ Takip Ediliyor' : '⭐ Takip Et'}
                </button>
                
                <button onclick="event.stopImmediatePropagation(); window.location.href='stock.html?symbol=${kod}'" 
                        class="w-full py-3.5 bg-white text-slate-900 hover:bg-slate-100 rounded-2xl text-sm font-semibold transition-all">
                    Detayları Gör →
                </button>
            </div>
        `;

        card.onclick = (e) => {
            if (!e.target.closest('button')) {
                window.location.href = `stock.html?symbol=${kod}`;
            }
        };

        container.appendChild(card);
    });
}

function toggleTakip(kod, btn) {
    if (takipte.includes(kod)) {
        takipte = takipte.filter(k => k !== kod);
        btn.classList.remove('bg-emerald-500', 'text-black');
        btn.classList.add('bg-slate-800', 'hover:bg-slate-700');
        btn.textContent = '⭐ Takip Et';
    } else {
        takipte.push(kod);
        btn.classList.add('bg-emerald-500', 'text-black');
        btn.classList.remove('bg-slate-800', 'hover:bg-slate-700');
        btn.textContent = '✅ Takip Ediliyor';
    }
    
    localStorage.setItem('takipListesi', JSON.stringify(takipte));
    updateTakipListesi();
}

function updateTakipListesi() {
    const container = document.getElementById("takipListesi");
    container.innerHTML = "";
    document.getElementById("takipSayisi").textContent = takipte.length;

    takipte.forEach(kod => {
        const item = document.createElement("li");
        item.className = "bg-slate-800 hover:bg-slate-700 rounded-2xl p-5 transition-all cursor-pointer";
        item.innerHTML = `
            <a href="stock.html?symbol=${kod}" class="block">
                <span class="font-mono text-lg font-bold">${kod}</span>
            </a>
        `;
        container.appendChild(item);
    });
}

function scrollLeft() { document.getElementById("hisseListesi").scrollBy({left: -300, behavior: 'smooth'}); }
function scrollRight() { document.getElementById("hisseListesi").scrollBy({left: 300, behavior: 'smooth'}); }

// Arama
document.getElementById("searchInput").addEventListener("input", function() {
    const filter = this.value.toUpperCase().trim();
    document.querySelectorAll(".stock-card").forEach(card => {
        card.style.display = card.textContent.includes(filter) ? "" : "none";
    });
});

// Başlat
window.onload = () => {
    loadStocks();
    updateTakipListesi();
    
    if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.add('light');
        document.getElementById('themeBtn').textContent = '☀️';
    }
};
</script>
</body>
</html>
