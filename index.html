<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIST AI Tracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f172a; color:white; font-family:Arial, sans-serif; }
body.light { background:#f8fafc; color:#1e2937; }

.navbar { background:#111827; padding:15px; display:flex; gap:20px; align-items:center; }
body.light .navbar { background:#e2e8f0; color:#1e2937; }

.container { padding:20px; }
.card { background:#111827; border:1px solid #1f2937; border-radius:12px; padding:15px; margin-bottom:20px; }
body.light .card { background:white; border-color:#cbd5e1; }

.stock-card { 
    min-width:280px; background:#111827; border:1px solid #1f2937; 
    border-radius:12px; padding:15px; cursor:pointer; transition:0.2s;
}
body.light .stock-card { background:white; border-color:#cbd5e1; }
.stock-card:hover { transform:scale(1.03); }

.positive { color:#22c55e; }
.negative { color:#ef4444; }

.theme-toggle { margin-left:auto; padding:8px 16px; background:#334155; border:none; border-radius:8px; cursor:pointer; }

.news-item { padding:10px; background:#1e2937; margin:8px 0; border-radius:8px; font-size:0.9em; }
</style>
</head>
<body>

<div class="navbar">
    <a href="#">Ana Sayfa</a>
    <a href="#">Portföy</a>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="container">
    <h1>📈 BIST AI Tracker</h1>

    <!-- Genel BIST 30 Grafiği -->
    <div class="card">
        <h2>BIST 30 Endeksi</h2>
        <div style="height:480px;">
            <iframe src="https://www.tradingview.com/widgetembed/?symbol=BIST%3AXU030&interval=D" 
                    width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <input id="searchInput" placeholder="Hisse ara (THYAO, ASELS...)" 
           style="width:100%; padding:14px; margin:15px 0; border-radius:10px; background:#1e2937; color:white; font-size:1.1em;">

    <div id="hisseListesi" style="display:flex; gap:15px; overflow-x:auto; padding:10px 0; flex-wrap:wrap;"></div>

    <!-- Detay Panel -->
    <div id="detailPanel" class="card" style="display:none;">
        <h2 id="detailTitle"></h2>
        
        <div style="height:460px; margin:15px 0;">
            <iframe id="tvWidget" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
        </div>

        <h3>AI Yorum</h3>
        <p id="aiYorum" style="background:#1e2937; padding:12px; border-radius:8px; line-height:1.5;"></p>

        <h3>Son Haberler</h3>
        <div id="newsContainer"></div>

        <button onclick="setAlarm()" style="margin:10px 5px 0 0;">🔔 Alarm Kur</button>
        <button onclick="closeDetail()">Kapat</button>
    </div>

    <!-- Portföy -->
    <div class="card">
        <h2>💼 Portföy</h2>
        <input id="pKod" placeholder="Kod" style="padding:8px;width:25%;">
        <input id="pAdet" type="number" placeholder="Adet" style="padding:8px;width:20%;">
        <input id="pAlis" type="number" placeholder="Alış Fiyatı" style="padding:8px;width:25%;">
        <button onclick="addPortfolio()">Ekle</button>

        <table style="width:100%; margin-top:15px; border-collapse:collapse;" id="portTable">
            <thead><tr><th>Kod</th><th>Adet</th><th>Alış</th><th>Güncel</th><th>Değer</th><th>K/Z</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let portfolio = JSON.parse(localStorage.getItem('bistPortfolio')) || [];

// Tema
function toggleTheme() { document.body.classList.toggle('light'); }

// Hisseler
const bistHisseler = ["THYAO","ASELS","TUPRS","KCHOL","EREGL","AKBNK","GARAN","ISCTR","SAHOL","YKBNK","BIMAS","FROTO","PETKM","TCELL","SISE","KOZAL","GUBRF","EKGYO","HALKB","VAKBN","SASA","HEKTS","TKFEN","ALARK","KRDMD","VESBE","TOASO","AYGAZ","ENJSA","PGSUS"];

function loadStocks() {
    const container = document.getElementById("hisseListesi");
    container.innerHTML = "";

    bistHisseler.forEach(kod => {
        const card = document.createElement("div");
        card.className = "stock-card";
        card.innerHTML = `<h3>${kod}</h3><p style="color:#94a3b8;">Tıklayınca grafik açılır</p>`;
        card.onclick = () => showDetail(kod);
        container.appendChild(card);
    });
}

function showDetail(kod) {
    document.getElementById("detailPanel").style.display = "block";
    document.getElementById("detailTitle").textContent = kod + " Detay";

    // TradingView Hisse Grafiği
    document.getElementById("tvWidget").src = `https://www.tradingview.com/widgetembed/?symbol=BIST%3A${kod}&interval=D`;

    // AI Yorum (örnek)
    document.getElementById("aiYorum").textContent = `${kod} hissesi teknik olarak orta vadede pozitif sinyaller veriyor. Hacim ve hareketli ortalamalar takip edilmeli.`;

    // Haberler (geçici placeholder - istersen başka kaynak ekleriz)
    const newsCont = document.getElementById("newsContainer");
    newsCont.innerHTML = `
        <div class="news-item">• ${kod} ile ilgili son KAP bildirimi bekleniyor.</div>
        <div class="news-item">• Sektör ortalaması üzerinde performans gösteriyor.</div>
    `;
}

function closeDetail() {
    document.getElementById("detailPanel").style.display = "none";
}

function setAlarm() {
    const price = prompt("Alarm fiyatı girin (örn: 245.5):");
    if (price) alert(`🔔 ${price} TL alarmı ${document.getElementById("detailTitle").textContent} için kuruldu!`);
}

// Portföy (basit)
function addPortfolio() {
    const kod = document.getElementById("pKod").value.trim().toUpperCase();
    const adet = parseFloat(document.getElementById("pAdet").value);
    const alis = parseFloat(document.getElementById("pAlis").value);
    if (!kod || !adet || !alis) return alert("Tüm alanları doldurun!");

    portfolio.push({kod, adet, alis});
    localStorage.setItem('bistPortfolio', JSON.stringify(portfolio));
    renderPortfolio();
}

function renderPortfolio() {
    const tbody = document.querySelector("#portTable tbody");
    tbody.innerHTML = portfolio.map((p, i) => `
        <tr>
            <td>${p.kod}</td>
            <td>${p.adet}</td>
            <td>${p.alis}</td>
            <td>---</td>
            <td>---</td>
            <td>---</td>
            <td><button onclick="deletePortfolio(${i})" style="color:red;">Sil</button></td>
        </tr>
    `).join('');
}

window.deletePortfolio = function(i) {
    portfolio.splice(i, 1);
    localStorage.setItem('bistPortfolio', JSON.stringify(portfolio));
    renderPortfolio();
};

// Arama
document.getElementById("searchInput").addEventListener("input", function() {
    const filter = this.value.toUpperCase();
    document.querySelectorAll(".stock-card").forEach(card => {
        card.style.display = card.textContent.includes(filter) ? "block" : "none";
    });
});

window.onload = () => {
    loadStocks();
    renderPortfolio();
};
</script>
</body>
</html>
